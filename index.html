<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalOkies — Oklahoma City Small Business Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment:      #F3E4C4;
      --parchment-dark: #E0CFA0;
      --cream:          #FAF4E8;
      --dark:           #1D6878;
      --dark-mid:       #8A1810;
      --rust:           #C03808;
      --rust-light:     #D04818;
      --amber:          #F0A010;
      --amber-light:    #F5C020;
      --rose:           #D45A10;
      --sage:           #4E6840;
      --sage-light:     #6A8A58;
      --text:           #3A2818;
      --text-muted:     #7A6050;
      --border:         rgba(29, 104, 120, 0.2);
      --border-strong:  rgba(29, 104, 120, 0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--parchment);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── NAV ───────────────────────────────── */
    .nav {
      background: var(--dark);
      border-bottom: 3px solid var(--amber);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      gap: 1rem;
    }

    .nav-brand {
      display: flex;
      flex-direction: column;
      padding: 0.85rem 0;
      cursor: pointer;
      text-decoration: none;
    }

    .nav-brand-main {
      font-family: 'Rye', serif;
      font-size: 1.45rem;
      color: var(--amber);
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 1px 2px 0 rgba(0,0,0,0.5);
    }

    .nav-brand-sub {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(243,232,208,0.45);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
    }

    .nav-btn {
      background: none;
      border: 1px solid transparent;
      color: rgba(243,232,208,0.6);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s;
      border-radius: 2px;
    }

    .nav-btn:hover {
      color: var(--amber-light);
      border-color: rgba(196,124,40,0.4);
    }

    .nav-btn.active {
      color: var(--amber);
      border-color: var(--rust);
    }

    /* ─── HERO ──────────────────────────────── */
    .hero {
      background: var(--dark);
      padding: 5rem 2rem 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-eyebrow {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 1.25rem;
      opacity: 0.85;
    }

    .hero-title {
      font-family: 'Rye', serif;
      font-size: clamp(3.2rem, 9vw, 6.5rem);
      color: var(--parchment);
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-shadow: 3px 4px 0 rgba(0,0,0,0.45);
      margin-bottom: 0.25rem;
    }

    .hero-title-accent { color: var(--amber); }

    .hero-tagline {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(243,232,208,0.65);
      margin-bottom: 2.5rem;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .hero-cta {
      display: inline-block;
      background: var(--rust);
      color: var(--parchment);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.95rem 2.8rem;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, transform 0.15s;
      margin-bottom: 3.5rem;
    }

    .hero-cta::after {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid rgba(172,82,50,0.45);
      pointer-events: none;
    }

    .hero-cta:hover {
      background: var(--rust-light);
      transform: translateY(-2px);
    }

    .hero-land {
      width: 100%;
      display: block;
      height: 80px;
    }

    /* ─── DIVIDERS ──────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin: 0 0 2.5rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-mark {
      font-family: 'Rye', serif;
      font-size: 0.7rem;
      color: var(--rust);
      letter-spacing: 0.3em;
      opacity: 0.6;
    }

    /* ─── SECTIONS ──────────────────────────── */
    .section {
      max-width: 1120px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .section-head {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-family: 'Rye', serif;
      font-size: 2rem;
      color: var(--rust);
      margin-bottom: 0.5rem;
    }

    .section-sub {
      font-style: italic;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ─── BUSINESS CARD ─────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 1.75rem 1.75rem 1.5rem;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: default;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid var(--border);
      pointer-events: none;
      opacity: 0.45;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 4px 8px 24px rgba(30,16,8,0.14);
    }

    .card-badge {
      position: absolute;
      top: -1px;
      right: 1.25rem;
      background: var(--rust);
      color: var(--parchment);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
    }

    .card-icon {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      line-height: 1;
    }

    .card-cat {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 0.45rem;
    }

    .card-name {
      font-family: 'Rye', serif;
      font-size: 1.1rem;
      color: var(--dark-mid);
      line-height: 1.3;
      margin-bottom: 0.8rem;
    }

    .card-desc {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text-muted);
      font-style: italic;
    }

    .card-footer {
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .card-footer-pin {
      width: 8px;
      height: 8px;
      border-radius: 50% 50% 50% 0;
      background: var(--rust);
      transform: rotate(-45deg);
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* ─── ABOUT BAND ────────────────────────── */
    .about-band {
      background: var(--dark-mid);
      padding: 4.5rem 2rem;
    }

    .about-inner {
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }

    .about-title {
      font-family: 'Rye', serif;
      font-size: 1.8rem;
      color: var(--amber);
      margin-bottom: 1.25rem;
    }

    .about-text {
      font-size: 1rem;
      line-height: 1.85;
      color: rgba(243,232,208,0.7);
      font-style: italic;
    }

    .about-text strong {
      color: var(--parchment);
      font-style: normal;
    }

    /* ─── STATS ROW ─────────────────────────── */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 2.5rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-family: 'Rye', serif;
      font-size: 2rem;
      color: var(--amber);
      display: block;
      line-height: 1;
    }

    .stat-label {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(243,232,208,0.4);
      margin-top: 0.4rem;
    }

    /* ─── DIRECTORY PAGE ────────────────────── */
    .dir-header {
      background: var(--dark-mid);
      padding: 3.5rem 2rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .dir-title {
      font-family: 'Rye', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--parchment);
      text-shadow: 2px 3px 0 rgba(0,0,0,0.4);
      margin-bottom: 0.4rem;
    }

    .dir-sub {
      font-style: italic;
      color: rgba(243,232,208,0.55);
      font-size: 0.9rem;
    }

    .dir-controls {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem 2rem 0.5rem;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .search-input {
      width: 100%;
      padding: 0.85rem 1.25rem 0.85rem 2.75rem;
      background: var(--cream);
      border: 1px solid var(--border-strong);
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--rust); }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-icon svg { width: 16px; height: 16px; fill: none; stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; }

    .cat-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .cat-btn {
      background: var(--cream);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.42rem 1rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .cat-btn:hover {
      border-color: var(--rust);
      color: var(--rust);
    }

    .cat-btn.on {
      background: var(--rust);
      border-color: var(--rust);
      color: var(--parchment);
    }

    .dir-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
    }

    .dir-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      font-style: italic;
      color: var(--text-muted);
    }

    .dir-count {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      max-width: 1120px;
      margin: 1rem 2rem 0;
      padding: 0 0.25rem;
    }

    /* ─── FOOTER ────────────────────────────── */
    .footer {
      background: var(--dark);
      border-top: 3px solid var(--amber);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .footer-name {
      font-family: 'Rye', serif;
      font-size: 1.25rem;
      color: var(--amber);
      margin-bottom: 0.4rem;
    }

    .footer-sub {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: rgba(243,228,196,0.35);
    }

    /* ─── OKLAHOMA STRIP ────────────────────── */
    .ok-strip {
      background: var(--rose);
      padding: 3rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .ok-strip-inner {
      max-width: 860px;
      margin: 0 auto;
      text-align: center;
    }

    .ok-eyebrow {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--parchment);
      opacity: 0.75;
      margin-bottom: 2.25rem;
    }

    .ok-icons {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 3.5rem;
      flex-wrap: wrap;
    }

    .ok-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      opacity: 0.65;
      transition: opacity 0.2s;
    }

    .ok-icon:hover { opacity: 1; }

    .ok-icon svg { display: block; }

    .ok-icon-label {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(243,228,196,0.7);
      white-space: nowrap;
    }

    /* ─── RESPONSIVE ────────────────────────── */
    @media (max-width: 600px) {
      .nav { padding: 0 1rem; }
      .section { padding: 3rem 1.25rem; }
      .dir-controls { padding: 1.5rem 1.25rem 0.5rem; }
      .dir-grid { padding: 1.5rem 1.25rem 3rem; }
      .stats-row { gap: 2rem; }
    }
  </style>
</head>

function Divider({ label }) {
  return (
    <div className="divider">

function HomePage({ onGoDir }) {
  const featured = BUSINESSES.filter(b => b.featured);
  return (
    <>
      {/* Hero */}
      <section className="hero">
        <p className="hero-eyebrow">Oklahoma City, Oklahoma</p>
        <h1 className="hero-title">
          Local<span className="hero-title-accent">Okies</span>
        </h1>
        <p className="hero-tagline">
          Handpicked small businesses from the heart of the Sooner State
        </p>
        <button className="hero-cta" onClick={onGoDir}>Explore the Directory</button>
        <PrairieHorizon />
      </section>

      {/* Featured */}
      <section className="section">
        <div className="section-head">
          <h2 className="section-title">Featured Businesses</h2>
          <p className="section-sub">A few of our favorites worth knowing by name</p>
        </div>
        <div className="card-grid">
          {featured.map(b => <BusinessCard key={b.id} biz={b} featured />)}
        </div>
      </section>

      {/* Oklahoma Icons */}
      <OklahomaStrip />

      {/* About */}
      <div className="about-band">
        <div className="about-inner">
          <h2 className="about-title">Why LocalOkies?</h2>
          <p className="about-text">
            Oklahoma City has always had a <strong>stubborn, proud streak</strong> — the kind that
            builds a business by hand and keeps it running on handshakes. LocalOkies exists to make
            sure those businesses are <strong>easy to find and impossible to miss.</strong> This is
            your city. These are your neighbors. <strong>Shop local.</strong>
          </p>
          <div className="stats-row">
            <div className="stat">
              <span className="stat-num">{BUSINESSES.length}</span>
              <span className="stat-label">Local Businesses</span>
            </div>
            <div className="stat">
              <span className="stat-num">{CATEGORIES.length - 1}</span>
              <span className="stat-label">Categories</span>
            </div>
            <div className="stat">
              <span className="stat-num">1</span>
              <span className="stat-label">Great City</span>
            </div>
          </div>
        </div>
      </div>

      {/* Bottom CTA */}
      <section className="section" style={{ textAlign: 'center' }}>
        <Divider label="Browse the Directory" />
        <p style={{ fontStyle: 'italic', color: 'var(--text-muted)', marginBottom: '1.5rem', fontSize: '0.95rem' }}>
          {BUSINESSES.length} local businesses and counting
        </p>
        <button className="hero-cta" onClick={onGoDir}>See All Businesses</button>
      </section>
    </>
  );
}

function DirectoryPage() {
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('All');

  const filtered = BUSINESSES.filter(b => {
    const matchCat = cat === 'All' || b.category === cat;
    const q = search.toLowerCase();
    const matchSearch = !q ||
      b.name.toLowerCase().includes(q) ||
      b.description.toLowerCase().includes(q) ||
      b.neighborhood.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  return (
    <>
      <div className="dir-header">
        <h1 className="dir-title">The Directory</h1>
        <p className="dir-sub">Every last one of 'em</p>
      </div>

      <div className="dir-controls">
        <div className="search-wrap">
          <span className="search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input
            className="search-input"
            type="text"
            placeholder="Search businesses, neighborhoods…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
        <div className="cat-filters">
          {CATEGORIES.map(c => (
            <button
              key={c}
              className={`cat-btn${cat === c ? ' on' : ''}`}
              onClick={() => setCat(c)}
            >
              {c}
            </button>
          ))}
        </div>
      </div>

      {filtered.length > 0 && (
        <div className="dir-count" style={{ maxWidth: '1120px', margin: '1rem auto 0', padding: '0 2rem' }}>
          Showing {filtered.length} {filtered.length === 1 ? 'business' : 'businesses'}
        </div>
      )}

      <div className="dir-grid">
        {filtered.length === 0
          ? <div className="dir-empty">No businesses match your search. Try broadening your filter.</div>
          : filtered.map(b => <BusinessCard key={b.id} biz={b} />)
        }
      </div>
    </>
  );
}

/* ─────────────────────────────────────────────
   APP SHELL
───────────────────────────────────────────── */
function App() {
  const [page, setPage] = useState('home');

  return (
    <>
      <nav className="nav">
        <div className="nav-brand" onClick={() => setPage('home')}>
          <span className="nav-brand-main">LocalOkies</span>
          <span className="nav-brand-sub">OKC Small Business</span>
        </div>
        <div className="nav-links">
          <button className={`nav-btn${page === 'home' ? ' active' : ''}`} onClick={() => setPage('home')}>Home</button>
          <button className={`nav-btn${page === 'directory' ? ' active' : ''}`} onClick={() => setPage('directory')}>Directory</button>
        </div>
      </nav>

      <main>
        {page === 'home'
          ? <HomePage onGoDir={() => setPage('directory')} />
          : <DirectoryPage />
        }
      </main>

      <footer className="footer">
        <div className="footer-name">LocalOkies</div>
        <div className="footer-sub">Celebrating Oklahoma City's small businesses &nbsp;·&nbsp; Built with Oklahoma pride</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
